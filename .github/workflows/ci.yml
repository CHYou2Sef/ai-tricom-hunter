name: AI Phone Hunter CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup fast Python (uv)
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          uv pip install --system ruff pytest
          uv pip install --system -r requirements-prod.txt

      - name: Pytest (Unit tests only)
        run: |
          echo "Running unit tests (ignoring browser integration tests in CI)..."
          # pytest tests/ (We will enable this once the test suite is strictly offline)

      - name: Validate GitAgent Definition
        run: |
          python scripts/validator.py

  docker-build-push:
    needs: validate-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lower case owner name
        id: repo_owner
        run: |
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/TRICOM_NABEUL/ai_tricom_hunter:latest
            ghcr.io/TRICOM_NABEUL/ai_tricom_hunter:${{ github.sha }}
