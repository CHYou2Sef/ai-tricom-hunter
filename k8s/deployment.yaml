apiVersion: apps/v1
kind: Deployment
metadata:
  name: tricom-agent
  labels:
    app: tricom-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tricom-agent
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: tricom-agent
    spec:
      containers:
      - name: agent
        image: ghcr.io/youssef/ai_tricom_hunter:latest
        imagePullPolicy: Always
        resources:
          limits:
            cpu: "2"
            memory: "4Gi"
          requests:
            cpu: "1"
            memory: "2Gi"
        envFrom:
        - configMapRef:
            name: tricom-agent-config
        - secretRef:
            name: tricom-agent-secrets
        volumeMounts:
        - name: work-dir
          mountPath: /app/WORK
        - name: shm
          mountPath: /dev/shm
        readinessProbe:
          httpGet:
            path: /metrics
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /metrics
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
          failureThreshold: 3
        command: ["/bin/bash", "/app/scripts/start_with_monitoring.sh"]
      volumes:
      - name: work-dir
        persistentVolumeClaim:
          claimName: tricom-work-pvc
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: tricom-agent-metrics
spec:
  selector:
    app: tricom-agent
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  type: ClusterIP
