<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0B1F3A"/>
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#00D1FF" />
        </marker>
        <marker id="arrow-bi-1" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#00D1FF" />
        </marker>
        <marker id="arrow-bi-2" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 5 L 10 0 L 10 10 z" fill="#00D1FF" />
        </marker>
        
        <style>
            .subnet { fill: rgba(255,255,255,0.02); stroke: #00D1FF; stroke-dasharray: 5,5; rx: 10; ry: 10; }
            .master { fill: rgba(2, 119, 189, 0.2); stroke: #0277BD; stroke-width: 2px; rx: 8; ry: 8; }
            .redis { fill: rgba(230, 81, 0, 0.2); stroke: #E65100; stroke-width: 2px; rx: 8; ry: 8; }
            .agent { fill: rgba(46, 125, 50, 0.2); stroke: #2E7D32; stroke-width: 2px; rx: 40; ry: 40; }
            .browser { fill: rgba(123, 31, 162, 0.2); stroke: #7B1FA2; stroke-width: 2px; rx: 8; ry: 8; }
            
            .txt-title { fill: #FFF; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: bold; text-anchor: middle; }
            .txt-desc { fill: #CBD5E1; font-family: 'Inter', sans-serif; font-size: 11px; text-anchor: middle; }
            .txt-white { fill: #FFF; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: bold;}
            .line { stroke: #00D1FF; stroke-width: 2px; fill: none; marker-end: url(#arrow); }
            .line-bi { stroke: #00D1FF; stroke-width: 2px; fill: none; marker-end: url(#arrow-bi-1); marker-start: url(#arrow-bi-2); }
        </style>
    </defs>

    <text class="txt-title" x="450" y="40" font-size="22">05: Distributed Scalability Topology (Docker + Redis)</text>

    <!-- Docker Sub-Net Control Plane -->
    <rect class="subnet" x="50" y="80" width="800" height="180"/>
    <text class="txt-white" x="70" y="110">Docker Sub-Net (Control Plane)</text>

    <!-- Master & Redis -->
    <rect class="master" x="150" y="140" width="220" height="80"/>
    <text class="txt-title" x="260" y="175">Master Orchestrator</text>
    <text class="txt-desc" x="260" y="195">File Watcher API</text>

    <rect class="redis" x="550" y="140" width="220" height="80"/>
    <text class="txt-title" x="660" y="175">🗄️ Redis Broker</text>
    <text class="txt-desc" x="660" y="195">Distributed Queue System</text>

    <path class="line" d="M 370 180 L 540 180"/>
    <text class="txt-desc" x="455" y="170">Task Vector Push</text>

    <!-- Worker Alpha Cluster -->
    <rect class="subnet" x="50" y="300" width="380" height="250"/>
    <text class="txt-white" x="70" y="330">Worker Cluster Alpha</text>

    <rect class="agent" x="150" y="360" width="180" height="60"/>
    <text class="txt-title" x="240" y="385">Worker Node 1</text>
    <text class="txt-desc" x="240" y="405">LangGraph Loop</text>

    <rect class="browser" x="140" y="460" width="200" height="60"/>
    <text class="txt-title" x="240" y="485">Browserless Chrome</text>
    <text class="txt-desc" x="240" y="505">Headless Container Pod</text>

    <path class="line-bi" d="M 240 420 L 240 450"/>
    <text class="txt-desc" x="300" y="440">WebSocket CDP</text>

    <path class="line-bi" d="M 240 360 L 240 280 L 600 280 L 600 220"/>
    <text class="txt-desc" x="420" y="270">Pop Task / ACK</text>


    <!-- Worker Beta Remote Server -->
    <rect class="subnet" x="470" y="300" width="380" height="250"/>
    <text class="txt-white" x="490" y="330">Remote Server (Beta)</text>

    <rect class="agent" x="570" y="360" width="180" height="60"/>
    <text class="txt-title" x="660" y="385">Worker Node 2</text>
    <text class="txt-desc" x="660" y="405">LangGraph Loop</text>

    <rect class="browser" x="560" y="460" width="200" height="60"/>
    <text class="txt-title" x="660" y="485">Cloud Scraping API</text>
    <text class="txt-desc" x="660" y="505">Firecrawl / Zyte</text>

    <path class="line-bi" d="M 660 420 L 660 450"/>
    <text class="txt-desc" x="700" y="440">API / Webhook</text>

    <path class="line-bi" d="M 660 360 L 660 220"/>
    <text class="txt-desc" x="720" y="300">Pop Task / ACK</text>

</svg>
