<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
    <!-- Background -->
    <rect width="100%" height="100%" fill="#F8FAFC"/>
    
    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#1E428A" />
        </marker>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
            <feOffset dx="2" dy="2" result="offsetblur" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.2" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <style>
            .title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 28px; font-weight: bold; fill: #1E428A; text-anchor: middle; }
            .subtitle { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 18px; fill: #64748B; text-anchor: middle; }
            .node-rect { fill: #FFFFFF; stroke: #1E428A; stroke-width: 2; rx: 10; filter: url(#shadow); }
            .node-rect-accent { fill: #FFFFFF; stroke: #D22026; stroke-width: 2; rx: 10; filter: url(#shadow); }
            .node-text { font-family: Arial; font-size: 20px; font-weight: bold; fill: #1E293B; text-anchor: middle; }
            .node-subtext { font-family: Arial; font-size: 14px; fill: #64748B; text-anchor: middle; }
            .connector { fill: none; stroke: #1E428A; stroke-width: 3; marker-end: url(#arrowhead); }
            .label-box { fill: #F1F5F9; stroke: #CBD5E1; rx: 5; }
            .label-text { font-family: Arial; font-size: 12px; fill: #475569; text-anchor: middle; }
        </style>
    </defs>

    <!-- Header -->
    <text class="title" x="800" y="60">Mapping de l'Architecture Globale : AI Tricom Hunter</text>
    <text class="subtitle" x="800" y="90">Système Découplé Multi-Agent (Producer-Consumer)</text>

    <!-- 1. INGESTION LAYER -->
    <rect class="node-rect" x="100" y="150" width="250" height="120"/>
    <text class="node-text" x="225" y="200">📥 Couche d'Entrée</text>
    <text class="node-subtext" x="225" y="225">Raw Excel (input/incoming/)</text>

    <!-- Arrow to Pre-Process -->
    <path class="connector" d="M 350 210 L 450 210" />

    <!-- 2. PRE-PROCESSING (PRODUCER) -->
    <rect class="node-rect-accent" x="450" y="150" width="250" height="120"/>
    <text class="node-text" x="575" y="200">⚙️ pre_process.py</text>
    <text class="node-subtext" x="575" y="225">(The Producer Daemon)</text>
    <text class="node-subtext" x="575" y="245">Nettoyage &amp; Classification</text>

    <!-- Arrow to Queue -->
    <path class="connector" d="M 700 210 L 800 210" />

    <!-- 3. QUEUE SYSTEM -->
    <rect class="node-rect" x="800" y="150" width="250" height="120" stroke-dasharray="5,5"/>
    <text class="node-text" x="925" y="200">📂 Files d'Attente</text>
    <text class="node-subtext" x="925" y="225">Buckets: std, RS, SIREN</text>
    <text class="node-subtext" x="925" y="245">Surveillance Watchdog (24h/24)</text>

    <!-- Arrow to Main Orchestrator -->
    <path class="connector" d="M 925 270 L 925 380" />

    <!-- 4. ORCHESTRATOR (CONSUMER) -->
    <rect class="node-rect-accent" x="800" y="380" width="250" height="120"/>
    <text class="node-text" x="925" y="430">🔄 main.py</text>
    <text class="node-subtext" x="925" y="455">(The Consumer Orchestrator)</text>
    <text class="node-subtext" x="925" y="475">Gestion des Sémaphores Async</text>

    <!-- Divergence to Multi-Workers -->
    <path class="connector" d="M 800 440 L 700 440" />
    <path class="connector" d="M 800 440 L 750 440 L 750 510 L 700 510" />
    <path class="connector" d="M 800 440 L 750 440 L 750 370 L 700 370" />

    <!-- 5. AGENT POOL -->
    <rect class="node-rect" x="450" y="350" width="250" height="200"/>
    <text class="node-text" x="575" y="390">🧠 agent.py Cluster</text>
    <text class="node-subtext" x="575" y="420">Worker 1 (Playwright)</text>
    <text class="node-subtext" x="575" y="440">Worker 2 (Playwright)</text>
    <text class="node-subtext" x="575" y="460">Worker N (Playwright)</text>
    <text class="node-subtext" x="575" y="490">Extraction Cascade (SGE/RAG)</text>

    <!-- Arrow to Truth Engine -->
    <path class="connector" d="M 450 440 L 350 440" />

    <!-- 6. TRUTH ENGINE -->
    <rect class="node-rect" x="100" y="380" width="250" height="120"/>
    <text class="node-text" x="225" y="430">⚖️ Truth Engine</text>
    <text class="node-subtext" x="225" y="455">Validation Poids de Source</text>
    <text class="node-subtext" x="225" y="475">row_enricher synthesis</text>

    <!-- Arrow to Final Output -->
    <path class="connector" d="M 225 500 L 225 610" />

    <!-- 7. OUTPUT LAYER -->
    <rect class="node-rect" x="100" y="610" width="250" height="120"/>
    <text class="node-text" x="225" y="660">🏁 Résultats Finaux</text>
    <text class="node-subtext" x="225" y="685">Enriched.xlsx</text>
    <text class="node-subtext" x="225" y="705">Compliance Audit.json</text>

    <!-- Legend -->
    <rect x="1100" y="600" width="350" height="200" fill="white" stroke="#CBD5E1" rx="10"/>
    <text x="1120" y="630" font-family="Arial" font-size="16" font-weight="bold" fill="#1E293B">Légende Technique</text>
    
    <circle cx="1130" cy="660" r="10" fill="#1E428A"/>
    <text x="1150" y="665" font-family="Arial" font-size="14" fill="#475569">Flux Statique / Standard</text>
    
    <circle cx="1130" cy="690" r="10" fill="#D22026"/>
    <text x="1150" y="695" font-family="Arial" font-size="14" fill="#475569">Composant Actif (Daemon/Loop)</text>

    <line x1="1120" y1="720" x2="1140" y2="720" stroke="#1E428A" stroke-width="3" stroke-dasharray="5,5"/>
    <text x="1150" y="725" font-family="Arial" font-size="14" fill="#475569">Queue Asynchrone</text>

</svg>
