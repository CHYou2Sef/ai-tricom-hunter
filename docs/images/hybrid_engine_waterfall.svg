<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" rx="15" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#2d3436">Hybrid Engine Orchestration: The Waterfall Model</text>
  
  <!-- Input Node -->
  <rect x="300" y="80" width="200" height="50" rx="10" fill="#0984e3" stroke="#074b83" stroke-width="2"/>
  <text x="400" y="112" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Input Target URL</text>
  
  <!-- Classifier -->
  <polygon points="400,160 550,190 400,220 250,190" fill="#fab1a0" stroke="#d63031" stroke-width="2"/>
  <text x="400" y="195" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2d3436">URL Classifier</text>
  
  <!-- T1 Node -->
  <rect x="50" y="280" width="180" height="60" rx="10" fill="#55efc4" stroke="#00b894" stroke-width="2"/>
  <text x="140" y="305" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2d3436">Tier 1: Playwright</text>
  <text x="140" y="325" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2d3436">(Fast / Unprotected)</text>
  
  <!-- T2 Node -->
  <rect x="310" y="280" width="180" height="60" rx="10" fill="#ffeaa7" stroke="#fdcb6e" stroke-width="2"/>
  <text x="400" y="305" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2d3436">Tier 2: Nodriver</text>
  <text x="400" y="325" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2d3436">(Stealth / Cloudflare)</text>
  
  <!-- T3 Node -->
  <rect x="570" y="280" width="180" height="60" rx="10" fill="#a29bfe" stroke="#6c5ce7" stroke-width="2"/>
  <text x="660" y="305" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2d3436">Tier 3: Crawl4AI</text>
  <text x="660" y="325" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2d3436">(Hardened / Async)</text>
  
  <!-- Connectors -->
  <line x1="400" y1="130" x2="400" y2="160" stroke="#636e72" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 325 210 Q 140 230 140 280" fill="none" stroke="#636e72" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="220" x2="400" y2="280" stroke="#636e72" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 475 210 Q 660 230 660 280" fill="none" stroke="#636e72" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Arrowhead Def -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#636e72" />
    </marker>
  </defs>
</svg>
