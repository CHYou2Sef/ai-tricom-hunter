<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
    <rect width="100%" height="100%" fill="#0B1F3A" rx="10" ry="10"/>
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#00D1FF" />
        </marker>
        <style>
            .box { fill: rgba(0, 209, 255, 0.05); stroke: #00D1FF; stroke-width: 2px; rx: 8; ry: 8; }
            .title { fill: #00D1FF; font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
            .step-title { fill: #FFF; font-family: 'Inter', sans-serif; font-size: 16px; font-weight: bold; }
            .step-desc { fill: #A0C0E0; font-family: 'Inter', sans-serif; font-size: 13px; }
            .line { stroke: #00D1FF; stroke-width: 2px; fill: none; marker-end: url(#arrow); }
            .icon-box { fill: rgba(0, 209, 255, 0.15); stroke: #00D1FF; stroke-width: 1px; rx: 50%; ry: 50%; }
        </style>
    </defs>

    <text class="title" x="400" y="40">⚡ Tier 2: SQO (Search Query Optimization)</text>
    <text x="400" y="65" fill="#A0C0E0" font-family="Inter" font-size="14" text-anchor="middle">Constraint-Based Google Dorking</text>

    <!-- Step 1: Input -->
    <rect class="box" x="50" y="100" width="700" height="80"/>
    <text class="step-title" x="70" y="135">1. Domain Forcing dorks</text>
    <text class="step-desc" x="70" y="160">Agent appends "site:pappers.fr OR site:societe.com" (EEAT sources only) targeting authority.</text>

    <path class="line" d="M 400 180 L 400 220"/>

    <!-- Step 2: Generation -->
    <rect class="box" x="50" y="220" width="700" height="80"/>
    <text class="step-title" x="70" y="255">2. Snippet/Deep Content Capture</text>
    <text class="step-desc" x="70" y="280">Worker scrapes the first 3 SERP pages for deterministic telephone patterns (RegEx).</text>

    <path class="line" d="M 400 300 L 400 340"/>

    <!-- Step 3: Parsing -->
    <rect class="box" x="50" y="340" width="700" height="100"/>
    <text class="step-title" x="70" y="375">3. Multi-Match Reconciliation</text>
    <text class="step-desc" x="70" y="400">Worker cross-references multiple snippets for consistent telephone vectors.</text>
    <text class="step-desc" x="70" y="420">Reliability: Medium (Vulnerable to snippet truncation or out-of-date directories).</text>

    <!-- Artistic touch: Bolt icon -->
    <circle class="icon-box" cx="720" cy="40" r="25"/>
    <text x="720" y="45" font-size="20" text-anchor="middle">⚡</text>
</svg>
