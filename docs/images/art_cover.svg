<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="1000" height="500">
    <rect width="100%" height="100%" fill="#0A192F"/>
    <defs>
        <linearGradient id="brandFade" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#D22026" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#1E428A" stop-opacity="0.2"/>
        </linearGradient>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(79, 153, 214, 0.1)" stroke-width="1"/>
        </pattern>
        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background grid -->
    <rect width="100%" height="100%" fill="url(#grid)"/>

    <!-- Art elements -->
    <circle cx="850" cy="250" r="150" fill="none" stroke="#D22026" stroke-width="1" stroke-dasharray="10,5" opacity="0.5" transform="rotate(45 850 250)">
        <animateTransform attributeName="transform" type="rotate" from="0 850 250" to="360 850 250" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle cx="850" cy="250" r="100" fill="none" stroke="#4F99D6" stroke-width="2" opacity="0.3"/>
    
    <path d="M 750 250 L 800 150 L 900 150 L 950 250 L 900 350 L 800 350 Z" fill="rgba(210, 32, 38, 0.05)" stroke="#D22026" stroke-width="2" filter="url(#glow)"/>
    <circle cx="850" cy="250" r="15" fill="#D22026" filter="url(#glow)"/>

    <!-- Data lines reaching the core -->
    <path d="M 0 100 L 750 250" fill="none" stroke="url(#brandFade)" stroke-width="2"/>
    <path d="M 0 250 L 700 250" fill="none" stroke="url(#brandFade)" stroke-width="2"/>
    <path d="M 0 400 L 750 250" fill="none" stroke="url(#brandFade)" stroke-width="2"/>

    <!-- Typography -->
    <text x="100" y="220" fill="#FFF" font-family="'Montserrat', sans-serif" font-size="64" font-weight="900" filter="url(#glow)">AI TRICOM HUNTER</text>
    <text x="105" y="270" fill="#4F99D6" font-family="'Inter', sans-serif" font-size="24" letter-spacing="4">AUTONOMOUS DATA PIPELINE</text>
    
    <rect x="100" y="320" width="140" height="30" fill="rgba(210, 32, 38, 0.2)" stroke="#D22026" rx="4"/>
    <text x="170" y="340" fill="#FFF" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" text-anchor="middle">v2.0 MULTI-AGENT</text>

    <rect x="260" y="320" width="110" height="30" fill="rgba(30, 66, 138, 0.2)" stroke="#1E428A" rx="4"/>
    <text x="315" y="340" fill="#FFF" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" text-anchor="middle">EEAT SECURE</text>

</svg>
