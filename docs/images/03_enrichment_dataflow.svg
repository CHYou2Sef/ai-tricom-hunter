<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0B1F3A"/>
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#00D1FF" />
        </marker>
        <style>
            .header { fill: rgba(0, 209, 255, 0.1); stroke: #00D1FF; stroke-width: 2px; rx: 4; ry: 4; }
            .txt-title { fill: #FFF; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
            .txt-note { fill: #A0C0E0; font-family: 'Inter', sans-serif; font-size: 11px; text-anchor: middle; }
            .line-vert { stroke: rgba(0, 209, 255, 0.4); stroke-width: 2px; stroke-dasharray: 6,4; }
            .line-msg { stroke: #00D1FF; stroke-width: 2px; fill: none; marker-end: url(#arrow); }
            .msg-text { fill: #FFFFFF; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: bold; }
            .note-box { fill: #1E3A5F; stroke: #38BDF8; stroke-width: 1px; rx: 4; ry: 4;}
        </style>
    </defs>

    <text class="txt-title" x="450" y="30" font-size="20">03: Semantic Truth Engine Dataflow</text>

    <!-- Headers -->
    <rect class="header" x="50" y="60" width="140" height="40"/><text class="txt-title" x="120" y="85">🤖 Async Agent</text>
    <rect class="header" x="250" y="60" width="140" height="40"/><text class="txt-title" x="320" y="85">🔎 Extractor</text>
    <rect class="header" x="450" y="60" width="140" height="40"/><text class="txt-title" x="520" y="85">⚖️ Truth Engine</text>
    <rect class="header" x="650" y="60" width="100" height="40"/><text class="txt-title" x="700" y="85">📊 Excel Row</text>
    <rect class="header" x="780" y="60" width="100" height="40"/><text class="txt-title" x="830" y="85">🔐 JSON Audit</text>

    <!-- Vertical Lines -->
    <line class="line-vert" x1="120" y1="100" x2="120" y2="550"/>
    <line class="line-vert" x1="320" y1="100" x2="320" y2="550"/>
    <line class="line-vert" x1="520" y1="100" x2="520" y2="550"/>
    <line class="line-vert" x1="700" y1="100" x2="700" y2="550"/>
    <line class="line-vert" x1="830" y1="100" x2="830" y2="550"/>

    <!-- Messages -->
    <path class="line-msg" d="M 120 140 L 310 140"/>
    <text class="msg-text" x="130" y="130">1. Pass Raw AI String Array (SGE, RAG, DOM)</text>

    <!-- Extractor computes -->
    <rect class="note-box" x="220" y="160" width="200" height="40"/>
    <text class="txt-note" x="320" y="175">Apply Regex bounds</text>
    <text class="txt-note" x="320" y="190">Synthesize Micro-schema Patterns</text>

    <path class="line-msg" d="M 320 230 L 510 230"/>
    <text class="msg-text" x="330" y="220">2. Yield Candidate Tuples (Value, Source)</text>

    <!-- Truth Engine logic -->
    <rect class="note-box" x="420" y="260" width="200" height="60"/>
    <text class="txt-note" x="520" y="275">Calculates Effective Vector</text>
    <text class="txt-note" x="520" y="290">(Source Weight x Internal Confidence)</text>
    <text class="txt-note" x="520" y="310">e.g. Schema (1.0) > Gemini (0.75)</text>

    <path class="line-msg" d="M 520 350 L 690 350"/>
    <text class="msg-text" x="530" y="340">3. Mutate Row: Assign Winning Value</text>

    <!-- Data Row updating -->
    <rect class="note-box" x="600" y="370" width="200" height="40"/>
    <text class="txt-note" x="700" y="385">Update Attribute limits</text>
    <text class="txt-note" x="700" y="400">(SIREN, Tél, Dirigeant, etc.)</text>

    <path class="line-msg" d="M 700 440 L 820 440"/>
    <text class="msg-text" x="710" y="430">4. Append Event</text>

    <rect class="note-box" x="730" y="460" width="200" height="40"/>
    <text class="txt-note" x="830" y="475">Final Compile of Contextual JSON</text>
    <text class="txt-note" x="830" y="490">Actionable Compliance Tracker</text>
    
</svg>
