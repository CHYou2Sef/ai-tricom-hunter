<svg width="900" height="450" viewBox="0 0 900 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="450" rx="15" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="450" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#2d3436">Hybrid Engine Orchestration: 4-Tier Waterfall</text>
  
  <!-- Input Node -->
  <rect x="350" y="70" width="200" height="40" rx="10" fill="#0984e3" stroke="#074b83" stroke-width="2"/>
  <text x="450" y="95" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Input Target URL</text>
  
  <!-- Classifier -->
  <polygon points="450,130 580,160 450,190 320,160" fill="#fab1a0" stroke="#d63031" stroke-width="2"/>
  <text x="450" y="165" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2d3436">URL Classifier</text>
  
  <!-- T1 Node -->
  <rect x="50" y="240" width="180" height="60" rx="10" fill="#74b9ff" stroke="#0984e3" stroke-width="2"/>
  <text x="140" y="265" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2d3436">Tier 1: Patchright</text>
  <text x="140" y="285" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2d3436">(Fast / Default)</text>
  
  <!-- T2 Node -->
  <rect x="260" y="240" width="180" height="60" rx="10" fill="#55efc4" stroke="#00b894" stroke-width="2"/>
  <text x="350" y="265" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2d3436">Tier 2: Nodriver</text>
  <text x="350" y="285" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2d3436">(Stealth / CDP)</text>
  
  <!-- T3 Node -->
  <rect x="470" y="240" width="180" height="60" rx="10" fill="#ffeaa7" stroke="#fdcb6e" stroke-width="2"/>
  <text x="560" y="265" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2d3436">Tier 3: Crawl4AI</text>
  <text x="560" y="285" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2d3436">(Hardened JS)</text>

  <!-- T4 Node -->
  <rect x="680" y="240" width="180" height="60" rx="10" fill="#fab1a0" stroke="#e17055" stroke-width="2"/>
  <text x="770" y="265" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2d3436">Tier 4: Camoufox</text>
  <text x="770" y="285" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2d3436">(Gecko Anti-Detect)</text>

  <!-- Escape / Circuit Breaker -->
  <rect x="350" y="360" width="200" height="50" rx="25" fill="#d63031" stroke="#b33939" stroke-width="2"/>
  <text x="450" y="380" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">ALL FAIL</text>
  <text x="450" y="400" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">Circuit Breaker OPEN (Rotate Proxy)</text>

  <!-- Connectors from Start -->
  <line x1="450" y1="110" x2="450" y2="130" stroke="#636e72" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Connectors from Classifier to Tiers -->
  <path d="M 370 175 Q 140 190 140 240" fill="none" stroke="#636e72" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 410 180 Q 350 200 350 240" fill="none" stroke="#636e72" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 490 180 Q 560 200 560 240" fill="none" stroke="#636e72" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 530 175 Q 770 190 770 240" fill="none" stroke="#636e72" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Waterfall arrows (Failure Escalation) -->
  <path d="M 230 270 L 250 270" fill="none" stroke="#d63031" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#red-arrow)"/>
  <path d="M 440 270 L 460 270" fill="none" stroke="#d63031" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#red-arrow)"/>
  <path d="M 650 270 L 670 270" fill="none" stroke="#d63031" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#red-arrow)"/>

  <!-- Path to Circuit breaker -->
  <path d="M 770 300 Q 770 340 560 385" fill="none" stroke="#d63031" stroke-width="2" marker-end="url(#red-arrow)"/>

  <!-- Arrowhead Def -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#636e72" />
    </marker>
    <marker id="red-arrow" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d63031" />
    </marker>
  </defs>
</svg>
