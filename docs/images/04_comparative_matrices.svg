<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">
    <rect width="100%" height="100%" fill="#0B1F3A"/>
    <defs>
        <style>
            .title { fill: #00D1FF; font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: bold; }
            .th { fill: rgba(0, 209, 255, 0.2); stroke: #00D1FF; stroke-width: 1px; }
            .td { fill: rgba(255, 255, 255, 0.02); stroke: rgba(0, 209, 255, 0.5); stroke-width: 1px; }
            .th-txt { fill: #FFF; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; alignment-baseline: middle;}
            .td-txt { fill: #CBD5E1; font-family: 'Inter', sans-serif; font-size: 13px; text-anchor: middle; alignment-baseline: middle;}
            .highlight { fill: #00D1FF; font-weight: bold; }
        </style>
    </defs>

    <text class="title" x="50" y="40">📊 Computational Throughput: Sync vs Async Performance</text>

    <!-- Table Frame -->
    <!-- Row 1: Headers -->
    <rect class="th" x="50" y="70" width="200" height="50"/><text class="th-txt" x="150" y="95">Benchmark Metric</text>
    <rect class="th" x="250" y="70" width="220" height="50"/><text class="th-txt" x="360" y="95">Monolithic "Day 0" Script</text>
    <rect class="th" x="470" y="70" width="250" height="50"/><text class="th-txt" x="595" y="95">Asynchronous Multi-Agent Array</text>
    <rect class="th" x="720" y="70" width="130" height="50"/><text class="th-txt" x="785" y="95">Multiplier</text>

    <!-- Row 2 -->
    <rect class="td" x="50" y="120" width="200" height="50"/><text class="td-txt" x="150" y="145" font-weight="bold">Execution Model</text>
    <rect class="td" x="250" y="120" width="220" height="50"/><text class="td-txt" x="360" y="145">Standard Python GIL</text>
    <rect class="td" x="470" y="120" width="250" height="50"/><text class="td-txt" x="595" y="145">asyncio Event Loop + Playwright</text>
    <rect class="td" x="720" y="120" width="130" height="50"/><text class="th-txt highlight" x="785" y="145">Transformative</text>

    <!-- Row 3 -->
    <rect class="td" x="50" y="170" width="200" height="50"/><text class="td-txt" x="150" y="195" font-weight="bold">Max Concurrent Nodes</text>
    <rect class="td" x="250" y="170" width="220" height="50"/><text class="td-txt" x="360" y="195">1 Node (High RAM Blocking)</text>
    <rect class="td" x="470" y="170" width="250" height="50"/><text class="td-txt" x="595" y="195">25+ Nodes (WebSocket Mux)</text>
    <rect class="td" x="720" y="170" width="130" height="50"/><text class="th-txt highlight" x="785" y="195">2500% Gain</text>

    <!-- Row 4 -->
    <rect class="td" x="50" y="220" width="200" height="50"/><text class="td-txt" x="150" y="245" font-weight="bold">Failure State Recovery</text>
    <rect class="td" x="250" y="220" width="220" height="50"/><text class="td-txt" x="360" y="245">Lethal (Script halts entirely)</text>
    <rect class="td" x="470" y="220" width="250" height="50"/><text class="td-txt" x="595" y="245">Atomic (Row bumped to Retry)</text>
    <rect class="td" x="720" y="220" width="130" height="50"/><text class="th-txt highlight" x="785" y="245">Infinite Uptime</text>

    <!-- Row 5 -->
    <rect class="td" x="50" y="270" width="200" height="50"/><text class="td-txt" x="150" y="295" font-weight="bold">Network Boundedness</text>
    <rect class="td" x="250" y="270" width="220" height="50"/><text class="td-txt" x="360" y="295">TCP Blocking Wait</text>
    <rect class="td" x="470" y="270" width="250" height="50"/><text class="td-txt" x="595" y="295">Non-Blocking Task State</text>
    <rect class="td" x="720" y="270" width="130" height="50"/><text class="th-txt highlight" x="785" y="295">I/O Maximized</text>

</svg>
