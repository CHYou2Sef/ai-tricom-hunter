<svg viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with subtle gradient -->
  <defs>
    <linearGradient id="bg_gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="box_grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="waterfall_grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1400" height="900" fill="url(#bg_gradient)" />

  <!-- Header -->
  <text x="700" y="50" font-family="Inter, sans-serif" font-size="32" font-weight="800" fill="#f8fafc" text-anchor="middle" letter-spacing="1">PROJECT AI-TRICOM HUNTER: SYSTEM ARCHITECTURE 2026</text>
  <line x1="100" y1="70" x2="1300" y2="70" stroke="#334155" stroke-width="1" />

  <!-- PHASE 1: PRE-PROCESSOR -->
  <g transform="translate(50, 100)">
    <rect width="420" height="750" rx="15" fill="url(#box_grad)" stroke="#334155" stroke-width="1.5" />
    <text x="20" y="35" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#cbd5e1">1. PRE-PROCESSOR (The Gatekeeper)</text>
    <text x="20" y="55" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">File decomposition &amp; data classification</text>
    
    <!-- Input Files -->
    <g transform="translate(30, 80)">
      <rect width="80" height="100" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2" filter="url(#glow)" />
      <text x="40" y="45" font-family="Inter, sans-serif" font-size="24" fill="#3b82f6" text-anchor="middle">📥</text>
      <text x="40" y="75" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#f8fafc" text-anchor="middle">INCOMING</text>
      <text x="40" y="90" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">.xlsx / .csv / .json</text>
    </g>

    <!-- FileChunker -->
    <path d="M 110 130 L 150 130" stroke="#334155" stroke-width="2" stroke-dasharray="4" />
    <g transform="translate(160, 80)">
      <rect width="220" height="110" rx="10" fill="#0f172a" stroke="#475569" stroke-width="1.5" />
      <text x="110" y="30" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#f8fafc" text-anchor="middle">FILE CHUNKER</text>
      <circle cx="50" cy="70" r="15" fill="#1e293b" stroke="#3b82f6" />
      <text x="50" y="74" font-family="Inter, sans-serif" font-size="12" fill="#3b82f6" text-anchor="middle">P1</text>
      <circle cx="110" cy="70" r="15" fill="#1e293b" stroke="#3b82f6" />
      <text x="110" y="74" font-family="Inter, sans-serif" font-size="12" fill="#3b82f6" text-anchor="middle">P2</text>
      <circle cx="170" cy="70" r="15" fill="#1e293b" stroke="#3b82f6" />
      <text x="170" y="74" font-family="Inter, sans-serif" font-size="12" fill="#3b82f6" text-anchor="middle">P3</text>
      <text x="110" y="100" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Sidecar Metadata for Recovery</text>
    </g>

    <!-- Classification Gear -->
    <g transform="translate(180, 220)">
      <path d="M 30,0 L 50,0 M 40,-10 L 40,10" stroke="#64748b" stroke-width="2" />
      <circle cx="40" cy="40" r="30" fill="none" stroke="#64748b" stroke-dasharray="10 5" />
      <text x="40" y="45" font-family="Inter, sans-serif" font-size="30" text-anchor="middle">⚙️</text>
      <text x="40" y="85" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#f8fafc" text-anchor="middle">CLEAN &amp; SORT</text>
    </g>

    <!-- Buckets -->
    <g transform="translate(50, 350)">
      <!-- Sir Bucket -->
      <g>
        <rect width="320" height="45" rx="5" fill="#1e293b" stroke="#10b981" stroke-width="1" />
        <text x="15" y="28" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#10b981">🪣</text>
        <text x="40" y="28" font-family="Inter, sans-serif" font-size="13" fill="#f8fafc">SIR Bucket (SIRET + Name)</text>
      </g>
      <!-- STD Bucket -->
      <g transform="translate(0, 60)">
        <rect width="320" height="45" rx="5" fill="#1e293b" stroke="#f59e0b" stroke-width="1" />
        <text x="15" y="28" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#f59e0b">🪣</text>
        <text x="40" y="28" font-family="Inter, sans-serif" font-size="13" fill="#f8fafc">STD Bucket (Name + Addr)</text>
      </g>
      <!-- RS Bucket -->
      <g transform="translate(0, 120)">
        <rect width="320" height="45" rx="5" fill="#1e293b" stroke="#3b82f6" stroke-width="1" />
        <text x="15" y="28" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#3b82f6">🪣</text>
        <text x="40" y="28" font-family="Inter, sans-serif" font-size="13" fill="#f8fafc">RS Bucket (Expert Deep Dive)</text>
      </g>
    </g>
    
    <!-- Resilience Icon -->
    <g transform="translate(40, 700)">
        <text x="0" y="0" font-family="Inter, sans-serif" font-size="12" fill="#ef4444" font-weight="700">⚠️ AUTO-RECOVERY ENABLED</text>
        <text x="0" y="15" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8">Decomposition allows resuming from any crash</text>
    </g>
  </g>

  <!-- TRANSITION ARROW -->
  <path d="M 470 450 L 530 450" stroke="#334155" stroke-width="4" fill="none" marker-end="url(#arrowhead)" />
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155" />
    </marker>
  </defs>

  <!-- PHASE 2: THE HUNTER (MAIN ENGINE) -->
  <g transform="translate(540, 100)">
    <rect width="520" height="750" rx="15" fill="url(#box_grad)" stroke="#334155" stroke-width="1.5" />
    <text x="20" y="35" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#cbd5e1">2. THE HUNTER (Hybrid Brain)</text>
    <text x="20" y="55" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">Multi-tier waterfall automation &amp; AI Extraction</text>

    <!-- Brain / Orchestrator -->
    <g transform="translate(190, 80)">
      <rect width="140" height="100" rx="15" fill="#1e293b" stroke="#8b5cf6" stroke-width="2" filter="url(#glow)" />
      <text x="70" y="45" font-family="Inter, sans-serif" font-size="30" text-anchor="middle">🧠</text>
      <text x="70" y="75" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#f8fafc" text-anchor="middle">MAIN.PY</text>
      <text x="70" y="90" font-family="Inter, sans-serif" font-size="10" fill="#8b5cf6" text-anchor="middle">Hybrid Orchestrator</text>
    </g>

    <!-- Waterfall Engine -->
    <g transform="translate(40, 200)">
      <rect width="440" height="340" rx="10" fill="#0f172a" stroke="#475569" stroke-width="1.5" />
      <text x="220" y="30" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#f8fafc" text-anchor="middle">HYBRID WATERFALL ENGINE</text>
      
      <!-- Tier 1 -->
      <g transform="translate(20, 50)">
        <rect width="400" height="70" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" />
        <text x="20" y="30" font-family="Inter, sans-serif" font-size="14" font-weight="800" fill="#3b82f6">TIER 1</text>
        <text x="20" y="50" font-family="Inter, sans-serif" font-size="12" font-weight="400" fill="#f8fafc">PLAYWRIGHT (Default / Standard Pages)</text>
        <text x="380" y="40" font-family="Inter, sans-serif" font-size="14" text-anchor="end">🚀</text>
      </g>
      <!-- Tier 2 -->
      <path d="M 220 120 L 220 140" stroke="#475569" stroke-width="2" />
      <g transform="translate(20, 140)">
        <rect width="400" height="70" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5" />
        <text x="20" y="30" font-family="Inter, sans-serif" font-size="14" font-weight="800" fill="#8b5cf6">TIER 2</text>
        <text x="20" y="50" font-family="Inter, sans-serif" font-size="12" font-weight="400" fill="#f8fafc">NODRIVER (Stealth / WAF Bypassing)</text>
        <text x="380" y="40" font-family="Inter, sans-serif" font-size="14" text-anchor="end">🥷</text>
      </g>
      <!-- Tier 3 -->
      <path d="M 220 210 L 220 230" stroke="#475569" stroke-width="2" />
      <g transform="translate(20, 230)">
        <rect width="400" height="70" rx="8" fill="#1e293b" stroke="#ec4899" stroke-width="1.5" />
        <text x="20" y="30" font-family="Inter, sans-serif" font-size="14" font-weight="800" fill="#ec4899">TIER 3</text>
        <text x="20" y="50" font-family="Inter, sans-serif" font-size="12" font-weight="400" fill="#f8fafc">CRAWL4AI (Hardened / LLM Analysis)</text>
        <text x="380" y="40" font-family="Inter, sans-serif" font-size="14" text-anchor="end">🦂</text>
      </g>
    </g>

    <!-- AI Models -->
    <g transform="translate(40, 560)">
      <rect width="440" height="100" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1" />
      <text x="20" y="30" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#cbd5e1">AI EXPERT REASONING</text>
      <g transform="translate(30, 45)">
        <text x="0" y="15" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">Contextual search query generation</text>
        <text x="0" y="35" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">Data verification &amp; cleaning logic</text>
      </g>
      <text x="410" y="65" font-family="Inter, sans-serif" font-size="30" text-anchor="end">🤖</text>
    </g>

    <!-- Safety Features -->
    <g transform="translate(40, 680)">
      <circle cx="15" cy="15" r="5" fill="#f59e0b" />
      <text x="30" y="19" font-family="Inter, sans-serif" font-size="11" fill="#cbd5e1">GAUSSIAN DELAYS (Human-like activity)</text>
      
      <circle cx="260" cy="15" r="5" fill="#3b82f6" />
      <text x="275" y="19" font-family="Inter, sans-serif" font-size="11" fill="#cbd5e1">DUAL LOGGING (Persistence + Archive)</text>
      
      <circle cx="15" cy="40" r="5" fill="#10b981" />
      <text x="30" y="44" font-family="Inter, sans-serif" font-size="11" fill="#cbd5e1">EXPERT RESEARCHER FALLBACK (Tier 0)</text>
    </g>
  </g>

  <!-- PHASE 3: HARVEST -->
  <g transform="translate(1080, 100)">
    <rect width="270" height="750" rx="15" fill="url(#box_grad)" stroke="#334155" stroke-width="1.5" />
    <text x="20" y="35" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#cbd5e1">3. HARVEST</text>

    <!-- Success Bucket -->
    <g transform="translate(35, 120)">
      <rect width="200" height="150" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="2" filter="url(#glow)" />
      <text x="100" y="55" font-family="Inter, sans-serif" font-size="40" text-anchor="middle">✅</text>
      <text x="100" y="100" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#f8fafc" text-anchor="middle">RESULTS FOUND</text>
       <text x="100" y="125" font-family="Inter, sans-serif" font-size="11" fill="#a7f3d0" text-anchor="middle">Archived_Results/</text>
    </g>

    <!-- Failed Bucket -->
    <g transform="translate(35, 300)">
      <rect width="200" height="150" rx="10" fill="#7f1d1d" stroke="#ef4444" stroke-width="2" />
      <text x="100" y="55" font-family="Inter, sans-serif" font-size="40" text-anchor="middle">❌</text>
      <text x="100" y="100" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#f8fafc" text-anchor="middle">FAILED / NOT FOUND</text>
       <text x="100" y="125" font-family="Inter, sans-serif" font-size="11" fill="#fecaca" text-anchor="middle">Archived_Failed/</text>
    </g>

    <!-- Final Output -->
    <g transform="translate(55, 550)">
      <rect width="160" height="130" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2" />
      <text x="80" y="50" font-family="Inter, sans-serif" font-size="30" text-anchor="middle">📊</text>
      <text x="80" y="85" font-family="Inter, sans-serif" font-size="12" font-weight="800" fill="#f8fafc" text-anchor="middle">ENRICHED DATA</text>
      <text x="80" y="110" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Final Unified Excel</text>
    </g>
  </g>

  <!-- Footer Info -->
  <text x="700" y="880" font-family="Inter, sans-serif" font-size="12" fill="#475569" text-anchor="middle">AI TRICOM HUNTER ENGINE v3.0 | ARCHITECTURE SNAPSHOT 2026.04 | DESIGNED FOR 24/7 AUTONOMOUS OPERATION</text>

</svg>
