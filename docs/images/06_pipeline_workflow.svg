<svg width="1000" height="400" viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="400" rx="15" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="500" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#2d3436">Data Pipeline Workflow</text>
  
  <!-- Phase 1: Pre-process -->
  <rect x="50" y="80" width="250" height="250" rx="10" fill="#e8f4f8" stroke="#0984e3" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="175" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#0984e3">Phase 1: Pre-Process</text>
  <text x="175" y="130" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2d3436">pre_process.py (Daemon)</text>

  <rect x="75" y="160" width="200" height="40" rx="5" fill="#74b9ff" stroke="#00a8ff" stroke-width="1"/>
  <text x="175" y="185" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">File Chunker</text>

  <rect x="75" y="220" width="200" height="40" rx="5" fill="#74b9ff" stroke="#00a8ff" stroke-width="1"/>
  <text x="175" y="245" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Data Classification</text>
  
  <!-- Phase 2: Processing -->
  <rect x="375" y="80" width="250" height="250" rx="10" fill="#fcf3e8" stroke="#fdcb6e" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="500" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#d35400">Phase 2: AI Runner</text>
  <text x="500" y="130" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2d3436">main.py (Async Multi-Worker)</text>

  <rect x="400" y="160" width="200" height="40" rx="5" fill="#ffeaa7" stroke="#fdcb6e" stroke-width="1"/>
  <text x="500" y="185" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#d35400">4-Tier Hybrid Engine</text>

  <rect x="400" y="220" width="200" height="40" rx="5" fill="#ffeaa7" stroke="#fdcb6e" stroke-width="1"/>
  <text x="500" y="245" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#d35400">UUE Metadata Extraction</text>

  <!-- Phase 3: Archive & Output -->
  <rect x="700" y="80" width="250" height="250" rx="10" fill="#ebf8f2" stroke="#00b894" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="825" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#00b894">Phase 3: Archive / Output</text>

  <rect x="725" y="160" width="200" height="40" rx="5" fill="#55efc4" stroke="#00b894" stroke-width="1"/>
  <text x="825" y="185" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2d3436">Archived_Results (DONE)</text>

  <rect x="725" y="220" width="200" height="40" rx="5" fill="#fab1a0" stroke="#d63031" stroke-width="1"/>
  <text x="825" y="245" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2d3436">Archived_Failed (FAIL)</text>

  <!-- Flow Arrows -->
  <path d="M 300 200 L 375 200" fill="none" stroke="#636e72" stroke-width="3" marker-end="url(#arrowhead)"/>
  <path d="M 625 200 L 700 200" fill="none" stroke="#636e72" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Arrowhead Def -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#636e72" />
    </marker>
  </defs>
</svg>
