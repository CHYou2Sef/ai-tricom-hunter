<svg width="1000" height="600" viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="600" rx="15" fill="#f8f9fa"/>
  
  <text x="500" y="40" font-family="Arial, sans-serif" font-size="26" font-weight="bold" text-anchor="middle" fill="#2d3436">AI Tricom Hunter: Detailed System Architecture (V6)</text>
  
  <!-- Left Column: Input Data -->
  <rect x="50" y="80" width="200" height="400" rx="10" fill="#e8f4f8" stroke="#0984e3" stroke-width="2"/>
  <text x="150" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#0984e3">Data Ingestion</text>

  <rect x="70" y="140" width="160" height="40" rx="5" fill="#74b9ff" stroke="#00a8ff" stroke-width="1"/>
  <text x="150" y="165" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Raw CSV / Excel</text>

  <rect x="70" y="200" width="160" height="50" rx="5" fill="#74b9ff" stroke="#00a8ff" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="150" y="220" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">pre_process.py</text>
  <text x="150" y="240" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">(FileChunker)</text>

  <rect x="70" y="270" width="160" height="60" rx="5" fill="#81ecec" stroke="#00cec9" stroke-width="1"/>
  <text x="150" y="295" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2d3436">Priority Queues</text>
  <text x="150" y="315" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2d3436">std_input, RS_input, sir_input</text>

  <!-- Middle Column: Hybrid Engine -->
  <rect x="300" y="80" width="400" height="470" rx="10" fill="#fcf3e8" stroke="#fdcb6e" stroke-width="2"/>
  <text x="500" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#d35400">Hybrid Automation Engine</text>

  <rect x="320" y="140" width="360" height="50" rx="5" fill="#fab1a0" stroke="#e17055" stroke-width="1"/>
  <text x="500" y="160" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2d3436">Adaptive Circuit Breaker + Proxy Manager</text>
  <text x="500" y="180" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2d3436">Monitors 403s, Rotate Proxy on 5 Fails</text>

  <rect x="320" y="210" width="360" height="150" rx="5" fill="#ffeaa7" stroke="#fdcb6e" stroke-width="1"/>
  <text x="500" y="235" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2d3436">4-Tier Orchestrator</text>
  
  <rect x="340" y="250" width="80" height="30" rx="5" fill="#74b9ff" stroke="#0984e3"/>
  <text x="380" y="270" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">Patchright</text>
  
  <rect x="430" y="250" width="80" height="30" rx="5" fill="#55efc4" stroke="#00b894"/>
  <text x="470" y="270" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2d3436">Nodriver</text>
  
  <rect x="520" y="250" width="80" height="30" rx="5" fill="#81ecec" stroke="#00cec9"/>
  <text x="560" y="270" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2d3436">Crawl4AI</text>
  
  <rect x="610" y="250" width="80" height="30" rx="5" fill="#fab1a0" stroke="#e17055"/>
  <text x="650" y="270" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2d3436">Camoufox</text>

  <text x="500" y="315" font-family="Arial, sans-serif" font-size="12" font-style="italic" text-anchor="middle" fill="#d35400">"Fetch raw HTML payload via safest route"</text>
  <text x="500" y="340" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#d35400">CAPTCHA Solver Pipeline</text>

  <!-- UUE Section -->
  <rect x="320" y="380" width="360" height="150" rx="5" fill="#ffffff" stroke="#2d3436" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="500" y="415" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2d3436">Universal Unified Extractor (UUE)</text>
  
  <rect x="340" y="435" width="100" height="80" rx="5" fill="#81ecec" stroke="#00cec9"/>
  <text x="390" y="460" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2d3436">Semantic</text>
  <text x="390" y="480" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2d3436">JSON-LD</text>

  <rect x="450" y="435" width="100" height="80" rx="5" fill="#a29bfe" stroke="#6c5ce7"/>
  <text x="500" y="460" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2d3436">Heuristic</text>
  <text x="500" y="480" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2d3436">data-attrid</text>

  <rect x="560" y="435" width="100" height="80" rx="5" fill="#fdcb6e" stroke="#e17055"/>
  <text x="610" y="460" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2d3436">Visual</text>
  <text x="610" y="480" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2d3436">href="tel:"</text>

  <!-- Right Column: Export -->
  <rect x="750" y="80" width="200" height="400" rx="10" fill="#ebf8f2" stroke="#00b894" stroke-width="2"/>
  <text x="850" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#00b894">Data Warehouse</text>
  
  <rect x="770" y="180" width="160" height="60" rx="5" fill="#55efc4" stroke="#00b894" stroke-width="1"/>
  <text x="850" y="205" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2d3436">Archived_Results</text>
  <text x="850" y="225" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2d3436">Success (CSV/Excel)</text>

  <rect x="770" y="260" width="160" height="60" rx="5" fill="#fab1a0" stroke="#d63031" stroke-width="1"/>
  <text x="850" y="285" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2d3436">Archived_Failed</text>
  <text x="850" y="305" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2d3436">Missing info / Skipped</text>

  <rect x="770" y="340" width="160" height="50" rx="5" fill="#74b9ff" stroke="#0984e3" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="850" y="360" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">SQL Server (SSIS)</text>
  <text x="850" y="380" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Target Integration</text>

  <!-- Connectors -->
  <path d="M 250 280 L 300 280" fill="none" stroke="#636e72" stroke-width="3" marker-end="url(#arrowhead)"/>
  <path d="M 700 450 Q 720 450 720 300 Q 720 210 750 210" fill="none" stroke="#636e72" stroke-width="3" marker-end="url(#arrowhead)"/>
  <path d="M 500 360 L 500 380" fill="none" stroke="#636e72" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Arrowhead Def -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#636e72" />
    </marker>
  </defs>
</svg>
