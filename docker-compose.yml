# Industrial AI Hunter Stack

services:
  agent:
    build: .
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-youssef}/ai_tricom_hunter:latest
    container_name: tricom_ai_agent
    restart: unless-stopped
    # 🏎️ Industrial Optimisations
    shm_size: '2gb'           # Prevents Chrome "Aw, Snap!" crashes due to low shared memory
    init: true               # Correctly cleans up zombie browser processes
    ipc: host                # Allow zero-copy memory access for faster rendering
    
    environment:
      - CHROMIUM_BINARY_PATH=/usr/bin/google-chrome
      - DOCKER_ENV=true
      - PYTHONPATH=/app/src

    # ── Windows/Mac Performance Hack ──────────────────────────────────
    # Prevents slow I/O on host-mounted volumes for browser profiles
    tmpfs:
      - /app/WORK/browser_profiles:size=1G
    
    env_file:
      - .env.prod
    volumes:
      # Direct Wormhole: Map your Windows Host folder to the Container's WORK directory
      - ${HOST_WORK_DIR:-./WORK}:/app/WORK:Z
      - ${HOST_LOG_DIR:-./logs}:/app/logs:Z
      - ./scripts:/app/scripts:ro,Z
      # browser_profiles is handled by tmpfs above for speed
    
    # ── Automatic Launch Mode ───────────────────────────────────────────
    # Starts both the agent worker AND the FastAPI monitoring API (:8000)
    command: ["/bin/bash", "/app/scripts/start_with_monitoring.sh"]
    
    ports:
      - "8000:8000"           # Expose API for Monitoring/Prometheus
    
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4.0'

  # ── Ingestion Service (Pillar 0) ───────────────────────────────────
  # Watches INCOMING/ and prepares files for the agent.
  ingest:
    build: .
    container_name: tricom_ingest
    restart: unless-stopped
    environment:
      - DOCKER_ENV=true
      - PYTHONPATH=/app/src
    env_file:
      - .env.prod
    volumes:
      - ${HOST_WORK_DIR:-./WORK}:/app/WORK:Z
      - ${HOST_LOG_DIR:-./logs}:/app/logs:Z
      - ./scripts:/app/scripts:ro,Z
    command: python run/ingest.py

  # ── Metrics Storage ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: tricom_prometheus
    user: root
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:z
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    restart: unless-stopped

  # ── Visualisation Dashboard ───────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: tricom_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin  # Change this in production!
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
