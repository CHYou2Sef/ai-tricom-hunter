# Industrial AI Hunter Stack

services:
  # 🤖 3-Layer Autonomous Supervisor
  # Manages Layer 0 (Ingest), Layer 1 (Phone Hunter), and Layer 2 (Social Fallback)
  supervisor:
    build: .
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-youssef}/ai_tricom_hunter:latest
    container_name: tricom_supervisor
    restart: unless-stopped
    # 🏎️ Industrial Optimisations
    shm_size: '2gb'           # Prevents Chrome "Aw, Snap!" crashes due to low shared memory
    init: true               # Correctly cleans up zombie browser processes
    ipc: host                # Allow zero-copy memory access for faster rendering
    
    environment:
      - CHROMIUM_BINARY_PATH=/usr/bin/google-chrome-stable
      - DOCKER_ENV=true
      - PYTHONPATH=/app/src
      - LAYER0_ENABLED=true
      - LAYER2_ENABLED=true

    env_file:
      - .env.prod
    volumes:
      - ${HOST_WORK_DIR:-./WORK}:/app/WORK:Z
      - browser_profiles:/app/WORK/browser_profiles
      - ${HOST_LOG_DIR:-./logs}:/app/logs:Z
      - ./scripts:/app/scripts:ro,Z
    
    command: python run/supervisor.py
    
    ports:
      - "8000:8000"           # Expose API for Monitoring/Prometheus (Metrics served via supervisor)
    
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('localhost', 8.8.8.8)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ── Metrics Storage ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: tricom_prometheus
    user: root
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:z
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9091:9090"
    restart: unless-stopped

  # ── Visualisation Dashboard ───────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: tricom_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin  # Change this in production!
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  browser_profiles:
