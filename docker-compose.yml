version: '3.8'

services:
  agent:
    build: .
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-youssef}/ai_tricom_hunter:latest
    container_name: tricom_ai_agent
    restart: unless-stopped
    # 🏎️ Industrial Optimisations
    shm_size: '2gb'           # Prevents Chrome "Aw, Snap!" crashes due to low shared memory
    init: true               # Correctly cleans up zombie browser processes
    ipc: host                # Allow zero-copy memory access for faster rendering
    
    environment:
      - CHROMIUM_BINARY_PATH=/usr/bin/google-chrome
      - DOCKER_ENV=true

    # ── Windows/Mac Performance Hack ──────────────────────────────────
    # Prevents slow I/O on host-mounted volumes for browser profiles
    tmpfs:
      - /app/browser_profiles:size=1G
    
    env_file:
      - .env.prod
    volumes:
      # Direct Wormhole: Map your Windows Host folder to the Container's WORK directory
      - ${HOST_WORK_DIR:-./WORK}:/app/WORK:Z
      - ${HOST_LOG_DIR:-./logs}:/app/logs:Z
      # browser_profiles is handled by tmpfs above for speed
    
    # ── Manual Launch Mode ──────────────────────────────────────────
    # Prevents the agent from starting automatically. 
    # Use 'docker exec -it tricom_ai_agent python main.py' to start.
    command: tail -f /dev/null
    
    ports:
      - "8000:8000"           # Expose API for Monitoring/Prometheus
    
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4.0'

  # ── Metrics Storage ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: tricom_prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    restart: unless-stopped

  # ── Visualisation Dashboard ───────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: tricom_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin  # Change this in production!
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
